# Amiga DevBench Configuration

[serial]
mode = "tcp"
host = "127.0.0.1"
port = 2345
pty_path = "/tmp/amiga-serial"

[emulator]
# "auto" prefers the patched debugger build (~/.amiga-devbench/fs-uae,
# /tmp/fsuae-src/fs-uae) when present, else falls back to fs-uae on PATH.
# Set to an explicit path to pin a specific binary.
binary = "auto"
config = "/Users/chris/Documents/FS-UAE/Configurations/AmiKit-Debug.fs-uae"
auto_start = true

[server]
port = 3000
log_level = "INFO"

[paths]
deploy_dir = "/Applications/AmiKit.app/Contents/SharedSupport/prefix/drive_c/AmiKit/Dropbox/Dev"

[bridge]
crash_handler_auto_enable = true

[fsuae_rpc]
# Remote-debug HTTP API exposed by the patched fs-uae build
# (see https://github.com/geekychris/fsuae_remote_patch). Stock fs-uae ignores
# these env vars, so leaving this enabled is safe either way.
enabled = "auto"          # "auto" | "on" | "off"
port = 8765
pause_at_boot = false
gdb_port = 0              # 0 disables the in-emulator GDB stub
